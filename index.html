    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Photography Booking</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
}
header{
    background:#000;
    color:white;
    text-align:center;
    padding:30px;
}
.container{
    max-width:600px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
input, select, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    width:100%;
    padding:15px;
    background:#25D366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    opacity:.9;
}
</style>
</head>
<body>

<header>
<h1>David Photography</h1>
<p>Book Your Photography Session</p>
</header>

<div class="container">

<form id="bookingForm">

<label>Full Name</label>
<input type="text" id="name" required>

<label>Phone Number</label>
<input type="tel" id="phone" required>

<label>Email</label>
<input type="email" id="email">

<label>Event Type</label>
<select id="event">
<option>Wedding</option>
<option>Birthday</option>
<option>Corporate Event</option>
<option>Graduation</option>
<option>Outdoor Shoot</option>
<option>Other</option>
</select>

<label>Event Date</label>
<input type="date" id="date" required>

<label>Location</label>
<input type="text" id="location">

<label>Additional Details</label>
<textarea id="details" rows="4"></textarea>

<button type="button" onclick="sendBooking()">
Book via WhatsApp
</button>

</form>

</div>

<script>
function sendBooking(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;
let event = document.getElementById("event").value;
let date = document.getElementById("date").value;
let location = document.getElementById("location").value;
let details = document.getElementById("details").value;

let message =
`NEW PHOTO BOOKING

Name: ${name}
Phone: ${phone}
Email: ${email}

Event: ${event}
Date: ${date}
Location: ${location}

Details:
${details}`;

let whatsapp = "https://wa.me/233539302559?text=" + encodeURIComponent(message);

window.open(whatsapp, "_blank");
}
</script>

</body>
</html>

</html>
